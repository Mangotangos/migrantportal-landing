<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- White background -->
  <rect width="1024" height="1024" fill="#ffffff" rx="180"/>

  <!-- Teal circle background -->
  <circle cx="512" cy="440" r="280" fill="#1A6B5C"/>

  <!-- Left hand (orange) reaching right -->
  <g transform="translate(512,440)">
    <!-- Left arm -->
    <path d="M-240,60 C-200,20 -140,0 -80,20 L-20,50 C0,60 10,80 0,100 L-60,130 C-120,110 -180,90 -240,60 Z" fill="#E85D26"/>
    <!-- Left fingers -->
    <ellipse cx="-20" cy="45" rx="18" ry="28" fill="#E85D26" transform="rotate(-20,-20,45)"/>
    <ellipse cx="5" cy="35" rx="16" ry="26" fill="#E85D26" transform="rotate(-30,5,35)"/>
    <ellipse cx="28" cy="30" rx="14" ry="24" fill="#E85D26" transform="rotate(-35,28,30)"/>

    <!-- Right arm (teal-white) reaching left -->
    <path d="M240,60 C200,20 140,0 80,20 L20,50 C0,60 -10,80 0,100 L60,130 C120,110 180,90 240,60 Z" fill="#ffffff" opacity="0.9"/>
    <!-- Right fingers -->
    <ellipse cx="20" cy="45" rx="18" ry="28" fill="#ffffff" opacity="0.9" transform="rotate(20,20,45)"/>
    <ellipse cx="-5" cy="35" rx="16" ry="26" fill="#ffffff" opacity="0.9" transform="rotate(30,-5,35)"/>
    <ellipse cx="-28" cy="30" rx="14" ry="24" fill="#ffffff" opacity="0.9" transform="rotate(35,-28,30)"/>

    <!-- Center connection glow -->
    <circle cx="0" cy="55" r="22" fill="#E85D26" opacity="0.85"/>
    <circle cx="0" cy="55" r="12" fill="#ffffff"/>
  </g>

  <!-- App name -->
  <text x="512" y="790" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#1A6B5C" text-anchor="middle" letter-spacing="2">MigrantPortal</text>

  <!-- Tagline -->
  <text x="512" y="860" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#E85D26" text-anchor="middle" letter-spacing="1">Connecting • Helping • Restoring</text>
</svg>
