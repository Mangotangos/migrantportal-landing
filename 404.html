<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — MigrantPortal</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --teal:#009DA5; --orange:#FF6129; --navy:#172936; --gray-200:#E8E8E8; --gray-600:#555; }
    body { font-family: 'Inter', sans-serif; background: #F0F2F5; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: white; border-bottom: 1px solid var(--gray-200); height: 64px; display: flex; align-items: center; padding: 0 40px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 19px; color: #0D0D0D; text-decoration: none; }
    .nav-logo-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--orange); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 800; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; }
    .num { font-family: 'Montserrat', sans-serif; font-size: 96px; font-weight: 800; color: var(--teal); line-height: 1; margin-bottom: 16px; }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
    p { font-size: 16px; color: var(--gray-600); margin-bottom: 32px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: var(--orange); color: white; padding: 12px 24px; border-radius: 7px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .btn-secondary { background: white; color: var(--teal); padding: 11px 24px; border-radius: 7px; font-size: 14px; font-weight: 600; border: 1px solid var(--gray-200); text-decoration: none; }
  </style>
</head>
<body>
  <nav><a href="/" class="nav-logo"><img src="logo.png" class="nav-logo-icon" alt="MigrantPortal" />MigrantPortal</a></nav>
  <div class="page">
    <div>
      <div class="num">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div class="btns">
        <a href="/" class="btn-primary">Go to Homepage</a>
        <a href="requests.html" class="btn-secondary">Browse Requests</a>
      </div>
    </div>
  </div>
</body>
</html>
