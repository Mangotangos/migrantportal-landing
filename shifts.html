<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="MigrantPortal volunteer shifts — sign up to serve.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Shifts — MigrantPortal</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://migrant-portal-production.up.railway.app" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" /></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:#009DA5; --teal-d:#007c84; --teal-lt:#e6f7f8;
      --orange:#FF6129; --orange-d:#e05020;
      --green:#22C55E; --green-lt:#dcfce7;
      --red:#EF4444; --red-lt:#fee2e2;
      --text:#0D0D0D; --gray-700:#3d3d3d; --gray-600:#555;
      --gray-400:#999; --gray-200:#E8E8E8; --gray-100:#F4F4F4; --gray-bg:#F0F2F5;
    }
    body { font-family:'Inter',sans-serif; color:var(--text); background:var(--gray-bg); }
    a { text-decoration:none; color:var(--teal); }
    button { font-family:'Inter',sans-serif; cursor:pointer; }

    .topbar {
      background:white; border-bottom:1px solid var(--gray-200);
      display:flex; align-items:center; gap:12px; padding:0 20px; height:52px;
      position:sticky; top:0; z-index:100;
    }
    .topbar-logo { display:flex; align-items:center; gap:8px; font-family:'Montserrat',sans-serif; font-size:16px; font-weight:800; color:var(--navy); letter-spacing:-0.3px; }
    .topbar-logo span { color:var(--teal); }
    .topbar-logo img { width:30px; height:30px; border-radius:7px; object-fit:contain; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .btn-logout { height:30px; padding:0 12px; border:1px solid var(--gray-200); border-radius:6px; font-size:12px; background:white; color:var(--gray-600); }
    .btn-logout:hover { border-color:var(--red); color:var(--red); }

    .page { max-width:900px; margin:0 auto; padding:28px 20px 80px; }
    .page-header { margin-bottom:24px; }
    .page-header h1 { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800; }
    .page-header p { font-size:13px; color:var(--gray-600); margin-top:4px; }

    .tabs { display:flex; gap:0; border-bottom:1px solid var(--gray-200); margin-bottom:24px; background:white; border-radius:10px 10px 0 0; }
    .stab { padding:12px 20px; font-size:13px; font-weight:500; color:var(--gray-600); cursor:pointer; border-bottom:2px solid transparent; }
    .stab:hover { color:var(--teal); }
    .stab.active { color:var(--teal); border-bottom-color:var(--teal); font-weight:600; }

    .layout { display:flex; gap:20px; align-items:flex-start; }
    .shifts-list { flex:1; display:flex; flex-direction:column; gap:12px; }
    .sidebar-form { width:280px; flex-shrink:0; position:sticky; top:62px; }

    .card { background:white; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:20px; }
    .card-title { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; margin-bottom:16px; }

    .shift-card {
      background:white; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.06);
      padding:18px; display:flex; flex-direction:column; gap:10px;
    }
    .shift-header { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .shift-title { font-weight:700; font-size:15px; }
    .shift-meta { font-size:12px; color:var(--gray-600); display:flex; flex-wrap:wrap; gap:8px; }
    .shift-meta span { display:flex; align-items:center; gap:4px; }
    .slot-bar { height:6px; background:var(--gray-200); border-radius:3px; overflow:hidden; margin-top:2px; }
    .slot-fill { height:100%; background:var(--teal); border-radius:3px; transition:width .4s; }
    .slot-fill.full { background:var(--orange); }
    .shift-actions { display:flex; gap:8px; }
    .btn-signup { height:34px; padding:0 16px; background:var(--teal); color:white; border:none; border-radius:7px; font-size:13px; font-weight:600; }
    .btn-signup:hover { background:var(--teal-d); }
    .btn-drop { height:34px; padding:0 16px; background:var(--red-lt); color:var(--red); border:1px solid #fca5a5; border-radius:7px; font-size:13px; font-weight:600; }
    .btn-drop:hover { background:var(--red); color:white; }
    .btn-cancel { height:34px; padding:0 14px; background:var(--gray-100); color:var(--gray-600); border:1px solid var(--gray-200); border-radius:7px; font-size:13px; font-weight:600; }
    .btn-cancel:hover { background:var(--red-lt); color:var(--red); }

    .form-row { margin-bottom:14px; }
    .form-row label { display:block; font-size:12px; font-weight:600; color:var(--gray-600); margin-bottom:5px; }
    .form-row input, .form-row textarea, .form-row select {
      width:100%; padding:8px 10px; border:1px solid var(--gray-200); border-radius:7px;
      font-size:13px; font-family:Inter,sans-serif; background:var(--gray-100);
    }
    .form-row input:focus, .form-row textarea:focus { border-color:var(--teal); background:white; outline:none; }
    .btn-create { width:100%; height:40px; background:var(--orange); color:white; border:none; border-radius:8px; font-size:14px; font-weight:700; }
    .btn-create:hover { background:var(--orange-d); }

    .empty { padding:40px; text-align:center; color:var(--gray-400); font-size:13px; }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:white; padding:10px 20px; border-radius:8px; font-size:13px; z-index:999; opacity:0; pointer-events:none; transition:opacity .2s; }
    #toast.show { opacity:1; }
    #toast.error { background:var(--red); }
  </style>
<script>
  (function() {
    window.addEventListener('error', function(e) {
      console.error('[MP]', e.message, e.filename + ':' + e.lineno + ':' + e.colno);
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[MP Promise]', e.reason);
    });
  })();
</script>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="topbar-logo" style="text-decoration:none"><img src="logo.png" alt="" />MigrantPortal</a>
  <nav style="display:flex;gap:0;margin-left:16px">
    <a href="dashboard.html" style="padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;color:var(--gray-600);">Home</a>
    <a href="requests.html" style="padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;color:var(--gray-600);">Requests</a>
    <a href="shifts.html" style="padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;color:var(--teal);font-weight:600;border-bottom:2px solid var(--teal);">Shifts</a>
    <a href="impact.html" style="padding:0 14px;height:52px;display:flex;align-items:center;font-size:13px;color:var(--gray-600);">Impact</a>
  </nav>
  <div class="topbar-right">
    <a href="dashboard.html" style="font-size:13px;font-weight:600;color:var(--teal);">Dashboard</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <h1>Volunteer Shifts</h1>
    <p>Browse upcoming shifts and sign up to help. Org leaders can create and manage shifts.</p>
  </div>

  <div class="tabs">
    <div class="stab active" id="tab-all" onclick="switchTab('all')">All Shifts</div>
    <div class="stab" id="tab-mine" onclick="switchTab('mine')">My Shifts</div>
    <div class="stab" id="tab-org" onclick="switchTab('org')">Manage (Org)</div>
  </div>

  <div class="layout">
    <div class="shifts-list" id="shifts-list">
      <div class="empty">Loading shifts…</div>
    </div>

    <!-- Create shift form — only shown on Manage tab for org owners -->
    <div class="sidebar-form" id="create-form" style="display:none">
      <div class="card">
        <div class="card-title">Create Shift</div>
        <div class="form-row"><label>Title *</label><input id="f-title" type="text" placeholder="e.g. Food Pantry Run"></div>
        <div class="form-row"><label>Description</label><textarea id="f-desc" rows="2" placeholder="Optional details…"></textarea></div>
        <div class="form-row"><label>Date *</label><input id="f-date" type="date"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-row"><label>Start *</label><input id="f-start" type="time"></div>
          <div class="form-row"><label>End *</label><input id="f-end" type="time"></div>
        </div>
        <div class="form-row"><label>Slots *</label><input id="f-slots" type="number" min="1" value="1"></div>
        <div class="form-row"><label>Location</label><input id="f-loc" type="text" placeholder="Address or area"></div>
        <button class="btn-create" onclick="createShift()">Create Shift</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="api.js"></script>
<script src="notif-bell.js"></script>
<script>
  requireAuth();
  const me = getUser();

  function toast(msg, err=false) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show' + (err?' error':'');
    clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 2500);
  }

  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(s) {
    const d = new Date(s + 'T00:00:00');
    return `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }

  function renderShifts(shifts, showCancel=false) {
    const el = document.getElementById('shifts-list');
    if (!shifts.length) { el.innerHTML = '<div class="empty">No shifts found.</div>'; return; }
    el.innerHTML = shifts.map(s => {
      const pct = s.slots_total > 0 ? Math.round(s.slots_filled / s.slots_total * 100) : 0;
      const full = s.slots_filled >= s.slots_total;
      return `
        <div class="shift-card">
          <div class="shift-header">
            <div>
              <div class="shift-title">${s.title}</div>
              ${s.description ? `<div style="font-size:12px;color:var(--gray-600);margin-top:3px">${s.description}</div>` : ''}
            </div>
            ${s.cancelled ? '<span style="background:var(--red-lt);color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px">Cancelled</span>' : ''}
          </div>
          <div class="shift-meta">
            <span>📅 ${fmtDate(s.date)}</span>
            <span>🕐 ${s.start_time} – ${s.end_time}</span>
            ${s.location ? `<span>📍 ${s.location}</span>` : ''}
            <span>👥 ${s.slots_filled}/${s.slots_total} slots</span>
          </div>
          <div>
            <div class="slot-bar"><div class="slot-fill ${full?'full':''}" style="width:${pct}%"></div></div>
          </div>
          ${!s.cancelled ? `<div class="shift-actions">
            ${showCancel
              ? `<button class="btn-cancel" onclick="cancelShift('${s.id}')">Cancel Shift</button>
                 <button class="btn-signup" style="background:var(--teal-lt);color:var(--teal);border:1px solid var(--teal)" onclick="toggleRoster('${s.id}', this)">👥 Roster</button>`
              : s.signed_up
                ? `<button class="btn-drop" onclick="dropShift('${s.id}')">Drop Shift</button>`
                : full
                  ? `<button class="btn-signup" disabled style="opacity:.5;cursor:not-allowed">Full</button>`
                  : `<button class="btn-signup" onclick="signupShift('${s.id}')">Sign Up</button>`
            }
          </div>
          <div id="roster-${s.id}" style="display:none;margin-top:8px;font-size:12px;color:var(--gray-600);border-top:1px solid var(--gray-200);padding-top:8px">Loading roster…</div>` : ''}
        </div>`;
    }).join('');
  }

  let activeTab = 'all';
  function switchTab(tab) {
    activeTab = tab;
    ['all','mine','org'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
    document.getElementById('create-form').style.display = tab === 'org' ? '' : 'none';
    loadTab(tab);
  }

  async function loadTab(tab) {
    document.getElementById('shifts-list').innerHTML = '<div class="empty">Loading…</div>';
    try {
      const url = tab === 'mine' ? '/shifts/mine' : tab === 'org' ? '/shifts/org' : '/shifts';
      const shifts = await apiGet(url);
      renderShifts(shifts, tab === 'org');
    } catch(e) {
      document.getElementById('shifts-list').innerHTML = `<div class="empty">${e.message.includes('403') ? 'Only org owners can manage shifts.' : 'Failed to load shifts.'}</div>`;
    }
  }

  async function signupShift(id) {
    try { await apiPost(`/shifts/${id}/signup`, {}); toast('Signed up!'); loadTab(activeTab); }
    catch(e) { toast(e.message, true); }
  }

  async function dropShift(id) {
    if (!await showConfirmModal({ title: 'Drop Shift', message: 'Are you sure you want to drop this shift?', confirmText: 'Drop Shift', danger: true })) return;
    try { await apiDelete(`/shifts/${id}/signup`); toast('Dropped.'); loadTab(activeTab); }
    catch(e) { toast(e.message, true); }
  }

  async function cancelShift(id) {
    if (!await showConfirmModal({ title: 'Cancel Shift', message: 'This will cancel the shift and remove all volunteer sign-ups.', confirmText: 'Cancel Shift', danger: true })) return;
    try { await apiDelete(`/shifts/${id}`); toast('Shift cancelled.'); loadTab(activeTab); }
    catch(e) { toast(e.message, true); }
  }

  async function createShift() {
    const title = document.getElementById('f-title').value.trim();
    const date = document.getElementById('f-date').value;
    const start = document.getElementById('f-start').value;
    const end = document.getElementById('f-end').value;
    const slots = parseInt(document.getElementById('f-slots').value) || 1;
    if (!title || !date || !start || !end) { toast('Fill in all required fields.', true); return; }
    try {
      await apiPost('/shifts', {
        title, date, start_time: start, end_time: end, slots_total: slots,
        description: document.getElementById('f-desc').value.trim() || undefined,
        location: document.getElementById('f-loc').value.trim() || undefined,
      });
      toast('Shift created!');
      ['f-title','f-desc','f-date','f-start','f-end','f-loc'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-slots').value = '1';
      loadTab('org');
    } catch(e) { toast(e.message, true); }
  }

  async function toggleRoster(id, btn) {
    const el = document.getElementById('roster-' + id);
    if (!el) return;
    if (el.style.display !== 'none') { el.style.display = 'none'; return; }
    el.style.display = '';
    el.textContent = 'Loading roster…';
    try {
      const list = await apiGet(`/shifts/${id}/roster`);
      if (!list.length) { el.textContent = 'No sign-ups yet.'; return; }
      el.innerHTML = '<strong>Signed up:</strong> ' + list.map(r =>
        `${r.name}${r.signed_up_at ? ' <span style="color:var(--gray-400)">('+r.signed_up_at.slice(0,10)+')</span>' : ''}`
      ).join(' &nbsp;·&nbsp; ');
    } catch(e) { el.textContent = 'Could not load roster.'; }
  }

  loadTab('all');
</script>

  <!-- ── CONFIRM MODAL ── -->
  <style>
    .conf-overlay{position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.48);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s ease;}
    .conf-overlay.open{opacity:1;pointer-events:all;}
    .conf-modal{background:#fff;border-radius:20px;width:calc(100% - 32px);max-width:420px;box-shadow:0 8px 12px rgba(0,0,0,.06),0 32px 80px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.06);transform:scale(.94) translateY(12px);opacity:0;overflow:hidden;transition:transform .22s cubic-bezier(.2,.8,.3,1),opacity .22s ease;}
    .conf-overlay.open .conf-modal{transform:scale(1) translateY(0);opacity:1;}
    .conf-top{padding:24px 24px 18px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid rgba(0,0,0,.07);}
    .conf-icon{width:44px;height:44px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .conf-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
    .conf-icon.danger{background:linear-gradient(135deg,#F85149,#d93f3a);box-shadow:0 4px 14px rgba(248,81,73,.4);}
    .conf-icon.teal{background:linear-gradient(135deg,#00C7CF,#0D7A8A);box-shadow:0 4px 14px rgba(0,199,207,.35);}
    .conf-title{font-size:16px;font-weight:800;letter-spacing:-.4px;color:#1A2332;margin-bottom:4px;}
    .conf-msg{font-size:13px;color:#718096;line-height:1.55;}
    .conf-footer{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;background:#f9fafb;border-top:1px solid rgba(0,0,0,.06);}
    .conf-btn-cancel{padding:9px 18px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;color:#4A5568;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
    .conf-btn-cancel:hover{background:#f1f5f9;border-color:#cbd5e0;}
    .conf-btn-ok{padding:9px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;color:#fff;transition:all .15s;}
    .conf-btn-ok.danger{background:linear-gradient(135deg,#F85149,#d93f3a);box-shadow:0 2px 8px rgba(248,81,73,.35);}
    .conf-btn-ok.teal{background:linear-gradient(135deg,#00C7CF,#0D7A8A);box-shadow:0 2px 8px rgba(0,199,207,.35);}
    .conf-btn-ok:hover{opacity:.88;transform:translateY(-1px);}
  </style>
  <div class="conf-overlay" id="confOverlay" onclick="if(event.target===this)_confCancel()">
    <div class="conf-modal" role="dialog" aria-modal="true">
      <div class="conf-top">
        <div class="conf-icon danger" id="confIcon">
          <svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        </div>
        <div>
          <div class="conf-title" id="confTitle">Confirm</div>
          <div class="conf-msg" id="confMsg"></div>
        </div>
      </div>
      <div class="conf-footer">
        <button class="conf-btn-cancel" onclick="_confCancel()">Cancel</button>
        <button class="conf-btn-ok danger" id="confOkBtn" onclick="_confOk()">Confirm</button>
      </div>
    </div>
  </div>
  <script>
  let _confResolve=null;
  function showConfirmModal({title='Confirm',message='',confirmText='Confirm',danger=true}={}){
    document.getElementById('confTitle').textContent=title;
    document.getElementById('confMsg').textContent=message;
    const btn=document.getElementById('confOkBtn'),icon=document.getElementById('confIcon'),cls=danger?'danger':'teal';
    btn.textContent=confirmText;btn.className='conf-btn-ok '+cls;
    icon.className='conf-icon '+cls;
    icon.innerHTML=danger
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
    document.getElementById('confOverlay').classList.add('open');
    return new Promise(res=>{_confResolve=res;});
  }
  function _confOk(){document.getElementById('confOverlay').classList.remove('open');if(_confResolve){_confResolve(true);_confResolve=null;}}
  function _confCancel(){document.getElementById('confOverlay').classList.remove('open');if(_confResolve){_confResolve(false);_confResolve=null;}}
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('confOverlay').classList.contains('open'))_confCancel();});
  </script>
</body>
</html>
